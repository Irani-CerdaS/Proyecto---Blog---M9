<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewsBlog - Minimalism</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="/css/styles.css" rel="stylesheet">
</head>
<body>

    <!-- Navbar Minimalista -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-dark fs-4" href="/">NewsBlog.</a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav align-items-center">
                    <li class="nav-item">
                        <a class="nav-link" href="#">Tecnología</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Diseño</a>
                    </li>
                    <li class="nav-item ms-lg-3 mt-3 mt-lg-0 auth-links" id="auth-section">
                        <!-- Se llena dinámicamente: Login o Crear News -->
                        <a class="nav-link text-primary fw-bold" href="/login.html">Acceder</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="hero-section text-center">
        <div class="container">
            <h1 class="hero-title">Historias que inspiran.</h1>
            <p class="hero-subtitle text-muted mt-3">Descubre lo último en tecnología, diseño y cultura, contado con elegancia.</p>
        </div>
    </header>

    <!-- Noticias (Main Content) -->
    <main class="container py-5">
        <div id="news-container" class="row g-4">
            <!-- Las tarjetas de noticias se inyectarán aquí mediante JS -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="text-center py-4 bg-white mt-5">
        <div class="container">
            <p class="text-muted mb-0 small">&copy; 2026 NewsBlog. Todos los derechos reservados.</p>
        </div>
    </footer>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- App Logic -->
    <script src="/js/config.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
