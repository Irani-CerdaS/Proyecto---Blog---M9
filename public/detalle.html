<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noticia - NewsBlog</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="/css/styles.css" rel="stylesheet">
    <style>
        .news-header {
            margin-top: 50px;
            margin-bottom: 30px;
        }
        .news-hero-img {
            width: 100%;
            height: auto;
            max-height: 500px;
            object-fit: cover;
            border-radius: 12px;
            background-color: #f5f5f7;
            margin-bottom: 30px;
        }
        .news-metadata {
            font-size: 0.9rem;
            color: #86868b;
        }
        .news-category-badge {
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--accent-color);
            letter-spacing: 0.5px;
            margin-right: 15px;
        }
        .news-content {
            font-size: 1.15rem;
            line-height: 1.8;
            color: #333336;
            white-space: pre-wrap;
        }
        .comments-section {
            background-color: #fcfcfc;
            border-top: 1px solid #eaeaea;
            padding-top: 40px;
            margin-top: 60px;
        }
        .comment-item {
            background-color: #ffffff;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }
    </style>
</head>
<body class="bg-white">

    <!-- Navbar Minimalista -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-dark fs-4" href="/">NewsBlog.</a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav align-items-center">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Inicio</a>
                    </li>
                    <li class="nav-item ms-lg-3 mt-3 mt-lg-0" id="auth-section">
                        <!-- Se llena dinámicamente -->
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Contenedor Principal (Cargando) -->
    <main class="container mb-5" id="news-container">
        <!-- Spinner o Mensaje mientras carga -->
        <div class="text-center mt-5 pt-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Cargando...</span>
            </div>
        </div>
    </main>

    <!-- Template para la presentación de la noticia (se inyectará en main) -->
    <!--
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="news-header">
                <div>
                    <span class="news-category-badge">Tecnología</span>
                    <span class="news-metadata">Por Autor • 12 Octubre, 2026</span>
                </div>
                <h1 class="fw-bold mt-3 lh-sm display-5">Título de la Noticia</h1>
            </div>
            <img src="..." class="news-hero-img">
            <div class="news-content">Contenido redaccional...</div>
        </div>
    </div>
    -->

    <!-- Sección de Comentarios (Cargando) -->
    <div class="comments-section d-none" id="comments-section-wrapper">
        <div class="container pb-5">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <h3 class="fw-bold mb-4">Comentarios (<span id="comments-count">0</span>)</h3>
                    
                    <!-- Formulario de Nuevo Comentario (Solo Auth) -->
                    <div id="comment-form-container" class="mb-5 d-none">
                        <form id="comment-form">
                            <div class="d-flex align-items-start gap-3">
                                <div class="w-100">
                                    <textarea class="form-control bg-white" rows="3" id="comment-text" required placeholder="Escribe tu comentario..."></textarea>
                                    <div class="text-end mt-2">
                                        <button type="submit" class="btn btn-primary rounded-pill px-4">Comentar</button>
                                    </div>
                                    <div id="comment-error" class="text-danger small mt-2 d-none"></div>
                                </div>
                            </div>
                        </form>
                    </div>
                    <div id="login-prompt" class="alert alert-light text-center mb-5 border rounded-3 text-muted">
                        Debes <a href="/login.html" class="fw-bold text-primary text-decoration-none">iniciar sesión</a> para comentar.
                    </div>

                    <!-- Lista de Comentarios -->
                    <div id="comments-list">
                        <!-- Comentarios dinámicos -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="text-center py-4 bg-white mt-5 border-top">
        <div class="container">
            <p class="text-muted mb-0 small">&copy; 2026 NewsBlog. Todos los derechos reservados.</p>
        </div>
    </footer>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/config.js"></script>
    <script src="/js/detail.js"></script>
</body>
</html>
