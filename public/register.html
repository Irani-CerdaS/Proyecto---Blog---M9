<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewsBlog - Registro</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="/css/styles.css" rel="stylesheet">
    <style>
        .auth-container {
            max-width: 450px;
            margin: 0 auto;
            margin-top: 50px;
            padding: 40px;
            background: #fff;
            border-radius: 18px;
            box-shadow: var(--card-shadow);
        }
    </style>
</head>
<body>

    <!-- Navbar Minimalista -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-dark fs-4" href="/">NewsBlog.</a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container py-5">
        <div class="auth-container mt-lg-5">
            <h2 class="fw-bold mb-4 text-center">Crear Cuenta</h2>
            <form id="register-form">
                <div id="error-alert" class="alert alert-danger d-none" role="alert"></div>
                
                <div class="mb-3">
                    <label for="username" class="form-label text-muted small fw-bold">Usuario</label>
                    <input type="text" class="form-control" id="username" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label text-muted small fw-bold">Correo Electrónico</label>
                    <input type="email" class="form-control" id="email" required>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label text-muted small fw-bold">Contraseña</label>
                    <input type="password" class="form-control" id="password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-bold py-2 mb-3">Registrarse</button>
                <div class="text-center">
                    <span class="text-muted small">¿Ya tienes cuenta?</span> <a href="/login.html" class="text-decoration-none small fw-bold">Inicia Sesión</a>
                </div>
            </form>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/config.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
